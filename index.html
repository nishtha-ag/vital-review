<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VITAL — Reasoning Trace Review</title>
<style>
  :root {
    --paper:#f7f8fa; --surface:#ffffff; --surface-2:#f0f3f7;
    --ink:#182230; --ink-soft:#5a6675; --ink-faint:#8b95a3;
    --line:#e2e7ee; --line-strong:#cfd6e0;
    --accent:#2f5d8a; --accent-soft:#e8f0f8;
    --include:#1f6f5c; --include-soft:#e4f1ec;
    --exclude:#b4532a; --exclude-soft:#f6e8e0;
    --flag:#9a7500; --flag-soft:#f6efd8;
    --agree:#1f6f5c; --disagree:#b4532a;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --serif:"Iowan Old Style","Charter",Georgia,"Times New Roman",serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    font-family:var(--sans); color:var(--ink); background:var(--paper);
    font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .app { display:flex; flex-direction:column; height:100vh; }

  /* ---- header ---- */
  header {
    display:flex; align-items:center; gap:18px; padding:10px 18px;
    background:var(--surface); border-bottom:1px solid var(--line); flex:0 0 auto;
  }
  .brand { font-weight:700; letter-spacing:.2px; font-size:15px; }
  .brand .sub { color:var(--ink-faint); font-weight:500; margin-left:8px; font-size:13px; }
  .header-spacer { flex:1 1 auto; }
  .stat { font-size:12.5px; color:var(--ink-soft); font-variant-numeric:tabular-nums; }
  .stat b { color:var(--ink); font-weight:600; }
  select, button, textarea { font-family:inherit; }
  .who {
    display:flex; align-items:center; gap:7px; font-size:13px; color:var(--ink-soft);
  }
  .who select {
    font-size:13px; padding:5px 8px; border:1px solid var(--line-strong);
    border-radius:7px; background:var(--surface); color:var(--ink);
  }
  .sync {
    font-size:12px; font-family:var(--mono); padding:4px 9px; border-radius:20px;
    background:var(--surface-2); color:var(--ink-soft); white-space:nowrap;
  }
  .sync.ok  { color:var(--include); background:var(--include-soft); }
  .sync.busy{ color:var(--accent);  background:var(--accent-soft); }
  .sync.err { color:var(--exclude); background:var(--exclude-soft); }

  /* ---- body layout ---- */
  .body { flex:1 1 auto; display:flex; min-height:0; }

  /* sidebar */
  .sidebar {
    flex:0 0 300px; border-right:1px solid var(--line); background:var(--surface);
    overflow-y:auto; overflow-x:hidden;
  }
  .filters {
    position:sticky; top:0; background:var(--surface); z-index:2;
    display:flex; gap:6px; padding:9px 10px; border-bottom:1px solid var(--line); flex-wrap:wrap;
  }
  .filters button {
    font-size:12px; padding:4px 9px; border:1px solid var(--line-strong);
    background:var(--surface); color:var(--ink-soft); border-radius:20px; cursor:pointer;
  }
  .filters button.on { background:var(--ink); color:#fff; border-color:var(--ink); }
  .plist { list-style:none; margin:0; padding:4px 0; }
  .pitem {
    display:flex; align-items:center; gap:9px; padding:9px 12px; cursor:pointer;
    border-left:3px solid transparent;
  }
  .pitem:hover { background:var(--surface-2); }
  .pitem.active { background:var(--accent-soft); border-left-color:var(--accent); }
  .pitem .rid { font-family:var(--mono); font-size:11px; color:var(--ink-faint); flex:0 0 auto; width:46px; }
  .pitem .ptitle {
    font-size:12.5px; color:var(--ink); overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; flex:1 1 auto;
  }
  .dot { flex:0 0 auto; width:9px; height:9px; border-radius:50%; background:var(--line-strong); }
  .dot.agree   { background:var(--agree); }
  .dot.partial { background:var(--flag); }
  .dot.disagree{ background:var(--disagree); }
  .dot.check   { background:var(--accent); }

  /* reading column */
  .reading { flex:1 1 auto; overflow-y:auto; padding:26px 34px 60px; min-width:0; }
  .reading-inner { max-width:720px; margin:0 auto; }
  .crumb { font-family:var(--mono); font-size:12px; color:var(--ink-faint); }
  .dup-tag {
    font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.5px;
    color:var(--flag); background:var(--flag-soft); border:1px solid #e6d9a8;
    padding:1px 6px; border-radius:10px; vertical-align:middle;
  }
  h1.ptitle-big {
    font-family:var(--serif); font-weight:600; font-size:23px; line-height:1.28;
    margin:6px 0 16px;
  }
  .decision-banner {
    display:flex; align-items:baseline; gap:10px; padding:11px 14px; border-radius:10px;
    margin-bottom:22px; border:1px solid transparent;
  }
  .decision-banner .lbl {
    font-size:11px; text-transform:uppercase; letter-spacing:.7px; font-weight:700; flex:0 0 auto;
  }
  .decision-banner .val { font-size:14px; font-weight:600; }
  .decision-banner.include { background:var(--include-soft); border-color:#bfe0d5; color:var(--include); }
  .decision-banner.exclude { background:var(--exclude-soft); border-color:#e8c9b8; color:var(--exclude); }

  .block { margin-bottom:22px; }
  .block .eyebrow {
    font-size:11px; text-transform:uppercase; letter-spacing:.8px; font-weight:700;
    color:var(--ink-faint); margin-bottom:7px;
  }
  .abstract, .trace { font-family:var(--serif); font-size:16px; line-height:1.62; color:#22303f; }
  .trace { white-space:pre-wrap; }
  details.think { border:1px solid var(--line); border-radius:9px; background:var(--surface); }
  details.think > summary {
    cursor:pointer; padding:9px 13px; font-size:12.5px; color:var(--ink-soft);
    font-weight:600; list-style:none;
  }
  details.think > summary::-webkit-details-marker { display:none; }
  details.think > summary::before { content:"▸ "; color:var(--ink-faint); }
  details.think[open] > summary::before { content:"▾ "; }
  details.think .think-body {
    padding:0 13px 13px; font-family:var(--mono); font-size:12px; line-height:1.55;
    color:var(--ink-soft); white-space:pre-wrap;
  }
  .fields { border-collapse:collapse; width:100%; font-size:13px; }
  .fields td { padding:6px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  .fields td.k { color:var(--ink-soft); width:210px; }
  .fields td.v { color:var(--ink); }

  /* review rail */
  .rail {
    flex:0 0 360px; border-left:1px solid var(--line); background:var(--surface);
    overflow-y:auto; display:flex; flex-direction:column;
  }
  .rail-section { padding:16px 18px; border-bottom:1px solid var(--line); }
  .rail-section h3 {
    margin:0 0 11px; font-size:11px; text-transform:uppercase; letter-spacing:.8px;
    color:var(--ink-faint); font-weight:700;
  }
  .verdict { display:flex; flex-direction:column; gap:8px; }
  .vbtn {
    display:flex; align-items:center; gap:10px; padding:11px 13px; border-radius:9px;
    border:1.5px solid var(--line-strong); background:var(--surface); cursor:pointer;
    font-size:14px; color:var(--ink); text-align:left; transition:none;
  }
  .vbtn:hover { border-color:var(--ink-soft); }
  .vbtn .tick { width:16px; flex:0 0 auto; font-weight:700; opacity:0; }
  .vbtn.sel .tick { opacity:1; }
  .vbtn.sel.approve    { border-color:var(--include); background:var(--include-soft); color:var(--include); }
  .vbtn.sel.needs_work { border-color:var(--flag);    background:var(--flag-soft);    color:var(--flag); }
  .vbtn.sel.wrong      { border-color:var(--exclude); background:var(--exclude-soft); color:var(--exclude); }

  textarea#feedback {
    width:100%; min-height:96px; resize:vertical; padding:10px 11px; font-size:13.5px;
    line-height:1.5; border:1px solid var(--line-strong); border-radius:9px; color:var(--ink);
    background:var(--surface);
  }
  textarea#feedback:focus { outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent); }
  .savenote { font-size:11.5px; color:var(--ink-faint); margin-top:6px; min-height:15px; font-family:var(--mono); }
  .savenote.saved { color:var(--include); }
  .savenote.saving{ color:var(--accent); }
  .savenote.err   { color:var(--exclude); }

  .decision-opts { display:flex; flex-direction:column; gap:2px; }
  .opt {
    display:flex; gap:9px; padding:8px 9px; border-radius:8px; cursor:pointer; align-items:flex-start;
  }
  .opt:hover { background:var(--surface-2); }
  .opt input { margin-top:3px; flex:0 0 auto; accent-color:var(--accent); }
  .opt .otext { font-size:12.5px; color:var(--ink); line-height:1.4; }
  .opt.is-original .otext::after {
    content:"original"; margin-left:7px; font-size:10px; font-family:var(--mono);
    color:var(--ink-faint); border:1px solid var(--line-strong); padding:0 5px; border-radius:10px;
    vertical-align:middle;
  }
  .opt.changed { background:var(--accent-soft); }
  .override-note { font-size:11.5px; color:var(--ink-faint); margin-top:9px; }
  .override-note b { color:var(--accent); }

  .others { display:flex; flex-direction:column; gap:9px; }
  .rev-card { border:1px solid var(--line); border-radius:8px; padding:9px 11px; background:var(--surface-2); }
  .rev-card .rh { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .rev-card .rname { font-weight:700; font-size:12px; }
  .rev-card .rstatus { font-size:11px; padding:1px 7px; border-radius:10px; font-weight:600; }
  .rstatus.approve    { color:var(--include); background:var(--include-soft); }
  .rstatus.needs_work { color:var(--flag);    background:var(--flag-soft); }
  .rstatus.wrong      { color:var(--exclude); background:var(--exclude-soft); }
  .rev-card .rfb { font-size:12px; color:var(--ink-soft); white-space:pre-wrap; }
  .rev-card .rchg { font-size:11.5px; color:var(--accent); margin-top:4px; }
  .muted { color:var(--ink-faint); font-size:12.5px; }

  .banner {
    padding:14px 18px; background:var(--flag-soft); color:#6a5200; font-size:13px;
    border-bottom:1px solid #e6d9a8;
  }
  .banner code { font-family:var(--mono); background:#fff; padding:1px 5px; border-radius:4px; }
  .empty { padding:60px 30px; text-align:center; color:var(--ink-faint); }

  kbd {
    font-family:var(--mono); font-size:11px; background:var(--surface-2); color:var(--ink-soft);
    border:1px solid var(--line-strong); border-bottom-width:2px; border-radius:5px; padding:1px 5px;
  }
  @media (max-width:1100px){ .rail{flex-basis:320px;} .sidebar{flex-basis:250px;} }
  @media (max-width:820px){
    .body{flex-direction:column;} .sidebar{flex-basis:auto;max-height:32vh;}
    .rail{flex-basis:auto;border-left:none;border-top:1px solid var(--line);}
  }
  @media (prefers-reduced-motion:reduce){ *{scroll-behavior:auto;} }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">VITAL<span class="sub">Reasoning-trace review</span></div>
    <div class="header-spacer"></div>
    <div class="stat" id="progress">—</div>
    <div class="who">
      Reviewer
      <select id="reviewerSel"></select>
    </div>
    <div class="sync" id="sync">connecting…</div>
  </header>

  <div id="setupBanner" class="banner" style="display:none;"></div>

  <div class="body">
    <aside class="sidebar">
      <div class="filters" id="filters">
        <button data-f="all" class="on">All</button>
        <button data-f="mine">Not reviewed by me</button>
        <button data-f="disagree">Needs adjudication</button>
        <button data-f="check">Check feedback</button>
      </div>
      <ul class="plist" id="plist"></ul>
    </aside>

    <main class="reading" id="reading">
      <div class="empty" id="readingEmpty">Loading traces…</div>
      <div class="reading-inner" id="readingInner" style="display:none;"></div>
    </main>

    <aside class="rail" id="rail" style="display:none;">
      <div class="rail-section">
        <h3>Your verdict on the reasoning</h3>
        <div class="verdict" id="verdict">
          <button class="vbtn approve"    data-status="approve"><span class="tick">✓</span>Approve — reasoning is sound</button>
          <button class="vbtn needs_work" data-status="needs_work"><span class="tick">✓</span>Needs work — flawed or incomplete</button>
          <button class="vbtn wrong"      data-status="wrong"><span class="tick">✓</span>Wrong paper / abstract</button>
        </div>
      </div>

      <div class="rail-section">
        <h3>Feedback / corrections</h3>
        <textarea id="feedback" placeholder="What's wrong with the reasoning, or how it should read. Saves automatically."></textarea>
        <div class="savenote" id="savenote"></div>
      </div>

      <div class="rail-section">
        <h3>Screening decision</h3>
        <div class="decision-opts" id="decisionOpts"></div>
        <div class="override-note" id="overrideNote"></div>
      </div>

      <div class="rail-section">
        <h3>Other reviewers</h3>
        <div class="others" id="others"></div>
      </div>
    </aside>
  </div>
</div>

<script>
/* ============================================================================
   CONFIG
   ============================================================================ */
const CONFIG = {
  // Paste your Apps Script Web App /exec URL here:
  API_URL: "https://script.google.com/macros/s/AKfycbxffDpaznsBWXgKiomRlmBuimZ9DKD8cD3-0SUKplH5DuW_5kOACdM-G591qTDZHWIEZw/exec",
  TRACES_URL: "sample_traces.jsonl",
  REVIEWERS: ["AW", "KA", "R3"],
  POLL_MS: 15000
};

// Exact Distiller decision vocabulary (for the override section).
const DECISION_OPTIONS = [
  "None of the above, so include",
  "No: Cause of death data is not presented in the study (as absolute numbers, or as a rate, risk or ratio)",
  "No: Less than 15 deaths with known cause",
  "No: Missing Abstract or full-text",
  "No: non-human study",
  "No: duplicate"
];

/* ============================================================================
   STATE
   ============================================================================ */
let papers = [];                 // from traces.jsonl
let papersByRefid = new Map();
let reviews = new Map();         // key `${refid}||${reviewer}` -> {status,feedback,changed_decision,timestamp}
let me = localStorage.getItem("vital_reviewer") || CONFIG.REVIEWERS[0];
let currentRefid = null;
let filter = "all";

// Anti-clobber: local writes the poll must not overwrite until the server confirms them.
// key -> { review, ts }
const pending = new Map();
let saveQueue = [];
let queueRunning = false;
let feedbackTimer = null;

const rkey = (refid, reviewer) => `${refid}||${reviewer}`;

/* ============================================================================
   INIT
   ============================================================================ */
async function init() {
  const sel = document.getElementById("reviewerSel");
  CONFIG.REVIEWERS.forEach(r => {
    const o = document.createElement("option");
    o.value = r; o.textContent = r; if (r === me) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener("change", async () => {
    await flushFeedback();           // don't lose in-progress text when switching identity
    me = sel.value;
    localStorage.setItem("vital_reviewer", me);
    if (currentRefid != null) renderMain();
    renderSidebar();
  });

  if (!CONFIG.API_URL) {
    const b = document.getElementById("setupBanner");
    b.style.display = "block";
    b.innerHTML = 'Backend not connected. Paste your Apps Script Web App URL into ' +
      '<code>CONFIG.API_URL</code> in index.html, then reload. ' +
      'Traces will still display, but verdicts won\'t save.';
  }

  document.querySelectorAll("#filters button").forEach(btn => {
    btn.addEventListener("click", () => {
      filter = btn.dataset.f;
      document.querySelectorAll("#filters button").forEach(x => x.classList.toggle("on", x === btn));
      renderSidebar();
    });
  });

  wireRail();
  wireKeyboard();

  await loadTraces();
  await loadReviews();
  renderSidebar();
  if (papers.length) selectPaper(papers[0].refid);
  startPolling();
}

/* ---- data loading ---- */
async function loadTraces() {
  try {
    const res = await fetch(CONFIG.TRACES_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    papers = text.split("\n").map(l => l.trim()).filter(Boolean).map(l => {
      try { return JSON.parse(l); } catch { return null; }
    }).filter(Boolean);
    papers.forEach(p => papersByRefid.set(String(p.refid), p));
  } catch (err) {
    document.getElementById("readingEmpty").textContent =
      "Couldn't load " + CONFIG.TRACES_URL + " — make sure it sits next to index.html in the repo. (" + err.message + ")";
  }
}

async function loadReviews() {
  if (!CONFIG.API_URL) return;
  setSync("busy", "syncing…");
  try {
    const res = await fetch(CONFIG.API_URL, { method: "GET" });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "bad response");
    const next = new Map();
    data.reviews.forEach(r => next.set(rkey(r.refid, r.reviewer), r));
    // Keep any locally pending write that the server hasn't caught up to yet,
    // so a poll can never wipe something the reviewer just did.
    pending.forEach((val, key) => next.set(key, val.review));
    reviews = next;
    setSync("ok", "synced ✓");
  } catch (err) {
    setSync("err", "offline — retrying");
  }
}

/* ============================================================================
   SAVE PATH  (queued, never dropped, never blocked by polling)
   ============================================================================ */
function currentLocalReview() {
  const key = rkey(currentRefid, me);
  const existing = reviews.get(key) || {};
  return {
    refid: String(currentRefid),
    reviewer: me,
    status: existing.status || "",
    feedback: existing.feedback || "",
    changed_decision: existing.changed_decision || ""
  };
}

function stageReview(patch) {
  // Merge a change into the current reviewer's review, update local state
  // immediately (optimistic), mark it pending, and enqueue a save.
  if (currentRefid == null || !me) return;
  const key = rkey(currentRefid, me);
  const merged = Object.assign(currentLocalReview(), patch, { timestamp: Date.now() });
  reviews.set(key, merged);
  pending.set(key, { review: merged, ts: Date.now() });
  saveQueue.push({ key, review: merged });
  runQueue();
  renderSidebarStatuses();  // reflect new badge without rebuilding editable fields
}

async function runQueue() {
  if (queueRunning) return;
  if (!CONFIG.API_URL) { note("saving disabled — no backend URL", "err"); return; }
  queueRunning = true;
  while (saveQueue.length) {
    // Collapse to the latest queued write per key (older ones are superseded).
    const job = saveQueue.pop();
    saveQueue = saveQueue.filter(j => j.key !== job.key);
    note("saving…", "saving");
    let ok = false;
    for (let attempt = 0; attempt < 4 && !ok; attempt++) {
      try {
        const res = await fetch(CONFIG.API_URL, {
          method: "POST",
          body: JSON.stringify(job.review)   // text/plain simple request -> no CORS preflight
        });
        const data = await res.json();
        ok = !!data.ok;
        if (!ok) throw new Error(data.error || "save rejected");
      } catch (err) {
        if (attempt < 3) await sleep(600 * (attempt + 1));
      }
    }
    if (ok) {
      // Confirmed: drop the pending guard only if nothing newer was staged since.
      const p = pending.get(job.key);
      if (p && p.review === job.review) pending.delete(job.key);
      note("saved ✓", "saved");
    } else {
      note("save failed — will retry", "err");
      saveQueue.push(job);            // requeue and back off
      await sleep(3000);
    }
  }
  queueRunning = false;
}

function flushFeedback() {
  // Force any debounced feedback to save now (e.g. before navigating away).
  if (feedbackTimer) { clearTimeout(feedbackTimer); feedbackTimer = null; }
  const ta = document.getElementById("feedback");
  if (currentRefid == null || !ta) return Promise.resolve();
  const cur = currentLocalReview();
  if (ta.value !== cur.feedback) stageReview({ feedback: ta.value });
  return Promise.resolve();
}

/* ============================================================================
   RAIL WIRING
   ============================================================================ */
function wireRail() {
  document.querySelectorAll("#verdict .vbtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const cur = currentLocalReview();
      const next = cur.status === btn.dataset.status ? "" : btn.dataset.status; // toggle off if same
      stageReview({ status: next });
      paintVerdict(next);
    });
  });

  const ta = document.getElementById("feedback");
  // Debounced auto-save; the poll never rebuilds this textarea, so text can't vanish.
  ta.addEventListener("input", () => {
    note("editing…", "saving");
    if (feedbackTimer) clearTimeout(feedbackTimer);
    feedbackTimer = setTimeout(() => stageReview({ feedback: ta.value }), 1200);
  });
  ta.addEventListener("blur", () => flushFeedback());
}

function wireKeyboard() {
  document.addEventListener("keydown", e => {
    const typing = document.activeElement && document.activeElement.tagName === "TEXTAREA";
    if (typing) return;
    if (e.key === "j" || e.key === "ArrowDown") { e.preventDefault(); step(1); }
    else if (e.key === "k" || e.key === "ArrowUp") { e.preventDefault(); step(-1); }
    else if (e.key === "1") { toggleStatus("approve"); }
    else if (e.key === "2") { toggleStatus("needs_work"); }
    else if (e.key === "3") { toggleStatus("wrong"); }
  });
  window.addEventListener("beforeunload", () => { flushFeedback(); });
}
function toggleStatus(s) {
  const cur = currentLocalReview();
  const next = cur.status === s ? "" : s;
  stageReview({ status: next }); paintVerdict(next);
}
function step(dir) {
  const list = visiblePapers();
  const idx = list.findIndex(p => String(p.refid) === String(currentRefid));
  const ni = idx + dir;
  if (ni >= 0 && ni < list.length) selectPaper(list[ni].refid);
}

/* ============================================================================
   RENDERING
   ============================================================================ */
function paintVerdict(status) {
  document.querySelectorAll("#verdict .vbtn").forEach(b =>
    b.classList.toggle("sel", b.dataset.status === status));
}

function renderDecisionOpts(originalDecision, chosen) {
  const wrap = document.getElementById("decisionOpts");
  wrap.innerHTML = "";
  const effective = chosen || originalDecision;
  DECISION_OPTIONS.forEach((opt, i) => {
    const id = "opt" + i;
    const isOriginal = opt === originalDecision;
    const isChanged = !!chosen && chosen !== originalDecision && opt === chosen;
    const row = document.createElement("label");
    row.className = "opt" + (isOriginal ? " is-original" : "") + (isChanged ? " changed" : "");
    row.htmlFor = id;
    row.innerHTML =
      `<input type="radio" name="decision" id="${id}" ${opt === effective ? "checked" : ""}>` +
      `<span class="otext">${escapeHtml(opt)}</span>`;
    row.querySelector("input").addEventListener("change", () => {
      // Store an override only when it differs from the original; else clear it.
      const changed = (opt === originalDecision) ? "" : opt;
      stageReview({ changed_decision: changed });
      renderDecisionOpts(originalDecision, changed);
      renderOverrideNote(originalDecision, changed);
    });
    wrap.appendChild(row);
  });
}
function renderOverrideNote(original, changed) {
  const el = document.getElementById("overrideNote");
  if (changed && changed !== original) {
    el.innerHTML = `You changed the decision to <b>${escapeHtml(shortDecision(changed))}</b>. ` +
                   `The original stays on record for comparison.`;
  } else {
    el.innerHTML = `Leave as the original decision, or pick a different one to override it.`;
  }
}

function renderMain() {
  const p = papersByRefid.get(String(currentRefid));
  if (!p) return;
  document.getElementById("readingEmpty").style.display = "none";
  const inner = document.getElementById("readingInner");
  inner.style.display = "block";
  document.getElementById("rail").style.display = "flex";

  const decision = p.decision || "";
  const included = decision === "None of the above, so include";
  const fieldsRows = included ? distillerFieldsHtml(p) : "";

  const ridLabel = p.duplicate ? `refid ${escapeHtml(String(p.dup_of))}` : `refid ${escapeHtml(String(p.refid))}`;
  const dupTag = p.duplicate ? ` &nbsp;<span class="dup-tag">duplicate</span>` : "";
  inner.innerHTML = `
    <div class="crumb">${ridLabel}${dupTag}</div>
    <h1 class="ptitle-big">${escapeHtml(p.title || "(no title)")}</h1>
    <div class="decision-banner ${included ? "include" : "exclude"}">
      <span class="lbl">Reviewer decision</span>
      <span class="val">${escapeHtml(decision || "—")}</span>
    </div>
    <div class="block">
      <div class="eyebrow">Abstract</div>
      <div class="abstract">${escapeHtml(p.abstract || "(no abstract)")}</div>
    </div>
    <div class="block">
      <div class="eyebrow">Generated reasoning trace</div>
      <div class="trace">${escapeHtml(p.trace || "(empty)")}</div>
    </div>
    ${p.thinking ? `
    <div class="block">
      <details class="think"><summary>Model thinking (raw)</summary>
        <div class="think-body">${escapeHtml(p.thinking)}</div>
      </details>
    </div>` : ""}
    ${fieldsRows ? `
    <div class="block">
      <div class="eyebrow">Extracted fields</div>
      <table class="fields">${fieldsRows}</table>
    </div>` : ""}
  `;

  // Populate the reviewer's OWN controls from local state (never from a poll mid-edit).
  const mine = reviews.get(rkey(currentRefid, me)) || {};
  paintVerdict(mine.status || "");
  document.getElementById("feedback").value = mine.feedback || "";
  note("", "");
  renderDecisionOpts(decision, mine.changed_decision || "");
  renderOverrideNote(decision, mine.changed_decision || "");
  renderOthers();
}

function renderOthers() {
  const box = document.getElementById("others");
  const p = papersByRefid.get(String(currentRefid));
  const original = p ? (p.decision || "") : "";
  const rows = CONFIG.REVIEWERS.filter(r => r !== me).map(r => {
    const rv = reviews.get(rkey(currentRefid, r));
    if (!rv || (!rv.status && !rv.feedback && !rv.changed_decision)) {
      return `<div class="rev-card"><div class="rh"><span class="rname">${r}</span>
              <span class="muted">not reviewed yet</span></div></div>`;
    }
    const chg = rv.changed_decision && rv.changed_decision !== original
      ? `<div class="rchg">→ changed decision: ${escapeHtml(shortDecision(rv.changed_decision))}</div>` : "";
    const st = rv.status
      ? `<span class="rstatus ${rv.status}">${statusLabel(rv.status)}</span>` : `<span class="muted">no verdict</span>`;
    return `<div class="rev-card">
      <div class="rh"><span class="rname">${r}</span>${st}</div>
      ${rv.feedback ? `<div class="rfb">${escapeHtml(rv.feedback)}</div>` : ""}
      ${chg}
    </div>`;
  }).join("");
  box.innerHTML = rows;
}

/* ---- sidebar ---- */
function visiblePapers() {
  return papers.filter(p => {
    if (filter === "all") return true;
    const st = paperStatus(p.refid);
    if (filter === "mine") return !(reviews.get(rkey(p.refid, me)) || {}).status;
    if (filter === "disagree") return st.kind === "disagree";
    if (filter === "check") return st.kind === "check";
    return true;
  });
}
function renderSidebar() {
  const ul = document.getElementById("plist");
  const scroll = document.querySelector(".sidebar").scrollTop;
  ul.innerHTML = "";
  visiblePapers().forEach(p => {
    const st = paperStatus(p.refid);
    const li = document.createElement("li");
    li.className = "pitem" + (String(p.refid) === String(currentRefid) ? " active" : "");
    li.dataset.refid = p.refid;
    li.innerHTML = `<span class="dot ${st.kind}"></span>
      <span class="rid">${escapeHtml(String(p.refid))}</span>
      <span class="ptitle">${escapeHtml(p.title || "(no title)")}</span>`;
    li.addEventListener("click", () => selectPaper(p.refid));
    ul.appendChild(li);
  });
  document.querySelector(".sidebar").scrollTop = scroll;
  updateProgress();
}
// Lightweight badge refresh — never touches the reading pane or rail inputs.
function renderSidebarStatuses() {
  document.querySelectorAll("#plist .pitem").forEach(li => {
    const st = paperStatus(li.dataset.refid);
    const dot = li.querySelector(".dot");
    dot.className = "dot " + st.kind;
  });
  updateProgress();
}

async function selectPaper(refid) {
  await flushFeedback();            // save current paper's text before leaving it
  currentRefid = String(refid);
  document.querySelectorAll("#plist .pitem").forEach(li =>
    li.classList.toggle("active", li.dataset.refid === currentRefid));
  renderMain();
}

/* ---- 2+1 status computation ---- */
function paperStatus(refid) {
  const subs = CONFIG.REVIEWERS
    .map(r => reviews.get(rkey(refid, r)))
    .filter(rv => rv && rv.status);
  if (subs.length === 0) return { kind: "none", label: "Unreviewed" };
  if (subs.length === 1) return { kind: "partial", label: "1 review" };
  // 2+ verdicts in: agree if all same status
  const statuses = subs.map(s => s.status);
  const allApprove = statuses.every(s => s === "approve");
  const allSame = statuses.every(s => s === statuses[0]);
  const anyFlag = statuses.some(s => s !== "approve");
  if (allApprove) return { kind: "agree", label: "Agreed" };
  if (allSame && anyFlag) return { kind: "check", label: "Agreed — check feedback" };
  return { kind: "disagree", label: "Needs adjudication" };
}

/* ---- stats ---- */
function updateProgress() {
  const total = papers.length;
  const mineDone = papers.filter(p => (reviews.get(rkey(p.refid, me)) || {}).status).length;
  const agreed = papers.filter(p => paperStatus(p.refid).kind === "agree").length;
  const disagree = papers.filter(p => paperStatus(p.refid).kind === "disagree").length;
  document.getElementById("progress").innerHTML =
    `<b>${mineDone}</b>/${total} by you · <b>${agreed}</b> agreed · <b>${disagree}</b> to adjudicate`;
}

/* ---- polling: badges + others only, never the editable fields ---- */
function startPolling() {
  setInterval(async () => {
    await loadReviews();
    renderSidebarStatuses();
    // Refresh only the read-only "other reviewers" panel for the open paper.
    if (currentRefid != null) renderOthers();
  }, CONFIG.POLL_MS);
}

/* ============================================================================
   HELPERS
   ============================================================================ */
function distillerFieldsHtml(p) {
  const map = [
    ["Language", p.language], ["Population type", p.population_type],
    ["Children under 5", p.under5], ["Surveillance period", p.surveillance],
    ["Number of causes", p.causes], ["AI algorithm reported", p.ai_algorithm],
    ["Performance comparison", p.performance]
  ];
  return map.map(([k, v]) =>
    `<tr><td class="k">${k}</td><td class="v">${escapeHtml(cleanVal(v))}</td></tr>`).join("");
}
function cleanVal(v){ if(v==null) return "Not reported"; const s=String(v).trim(); return (!s||s==="nan")?"Not reported":s; }
function statusLabel(s){ return s==="approve"?"Approved":s==="needs_work"?"Needs work":s==="wrong"?"Wrong paper":s; }
function shortDecision(d){ return d.startsWith("None of the above")?"Include":d.replace(/^No:\s*/,""); }
function note(msg, cls){ const el=document.getElementById("savenote"); el.textContent=msg; el.className="savenote"+(cls?(" "+cls):""); }
function setSync(cls, msg){ const el=document.getElementById("sync"); el.textContent=msg; el.className="sync "+cls; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

init();
</script>
